<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zin Web Dashboard - IMX Factory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 3D WebRTC Stream Background -->
    <div id="video-container">
        <iframe id="webrtc-iframe" src="" frameborder="0" allow="autoplay; fullscreen; microphone; camera"></iframe>
    </div>

    <!-- UI Overlay -->
    <div id="dashboard-overlay">
        <!-- Header -->
        <header>
            <div class="logo">Zin IMX Dashboard</div>
            <div id="connection-status" class="status-indicator">
                <span class="dot"></span>
                <span class="text">Connecting...</span>
            </div>
        </header>

        <!-- Main Content -->
        <main>
            <!-- Telemetry Cards -->
            <section class="telemetry-panel">
                <div class="card">
                    <h3>Simulation Status</h3>
                    <div id="sim-state" class="value text-warning">STOPPED</div>
                </div>
                <div class="card">
                    <h3>Units Per Hour (UPH)</h3>
                    <div id="uph-value" class="value">0</div>
                    <div class="unit">units/hr</div>
                </div>
                <div class="card">
                    <h3>Conveyor Speed</h3>
                    <div id="speed-display" class="value">0.0</div>
                    <div class="unit">m/s</div>
                </div>
            </section>

            <!-- Control Panel -->
            <section class="control-panel" style="max-height: calc(100vh - 100px); display: flex; flex-direction: column;">
                <!-- Folder Loading Section -->
                <div class="card" style="margin-bottom: 20px; flex-shrink: 0;">
                    <h2 style="font-size: 16px; margin-bottom: 12px; color: var(--text-color);">Load JSON Configuration</h2>
                    <div style="display: flex; flex-wrap: wrap; gap: 8px;">
                        <input type="text" id="configUrlInput" value="omniverse://10.6.180.60/Projects/Factory/IMX/IMX_1F/ProdLine_UPH/" style="flex: 1 1 200px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; color: var(--text-color); padding: 8px;" placeholder="Enter Omniverse Folder or JSON URL">
                        <button class="btn btn-secondary" onclick="loadConfigFolder(event)" style="white-space: nowrap; padding: 8px 16px;">Load</button>
                    </div>
                </div>
                
                <div class="card" style="display: flex; flex-direction: column; flex: 1; min-height: 0; padding-bottom: 15px;">
                    <h2>Production Controls</h2>
                    
                    <!-- Batch Update Section -->
                    <div style="background: rgba(255, 255, 255, 0.05); padding: 12px; border-radius: 8px; margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.1);">
                        <h3 style="font-size: 14px; margin-bottom: 8px; color: #ccc;">Batch Update All Lines</h3>
                        <div style="display: flex; flex-wrap: wrap; gap: 8px; align-items: flex-end;">
                            <div class="line-card-input" style="flex: 1 1 80px;">
                                <label>Speed (m/s)</label>
                                <input type="number" id="batch-speed" step="0.5" placeholder="e.g. 10" onfocus="isTyping=true" onblur="isTyping=false">
                            </div>
                            <div class="line-card-input" style="flex: 1 1 80px;">
                                <label>Delay (s)</label>
                                <input type="number" id="batch-delay" step="0.5" placeholder="e.g. 0" onfocus="isTyping=true" onblur="isTyping=false">
                            </div>
                            <div class="line-card-input" style="flex: 1 1 80px;">
                                <label>Interval (s)</label>
                                <input type="number" id="batch-interval" step="0.5" placeholder="e.g. 15" onfocus="isTyping=true" onblur="isTyping=false">
                            </div>
                            <button class="btn btn-primary" onclick="applyBatchSettings()" style="padding: 8px 16px; flex: 1 1 100px;">APPLY TO ALL</button>
                        </div>
                    </div>
                    
                    <div class="line-cards-container" id="linesContainer" style="flex: 1; min-height: 0; max-height: none; overflow-y: auto;">
                        <!-- Cards will be dynamically inserted here -->
                        <div style="color: #888; font-size: 14px; text-align: center; padding: 20px;">
                            Waiting for simulation to load lines...
                        </div>
                    </div>
                    
                    <div class="button-group main-controls" style="margin-top: 1rem; flex-shrink: 0;">
                        <button id="btn-start" class="btn btn-success">START ALL</button>
                        <button id="btn-stop" class="btn btn-danger">STOP ALL</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
